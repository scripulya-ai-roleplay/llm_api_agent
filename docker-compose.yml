services:
  # The agent service: consumes llm.agent.request, publishes llm.agent.result
  app:
    build: .
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - LLM_REQUEST_QUEUE=llm.agent.request
      - LLM_RESULT_QUEUE=llm.agent.result
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-You are a helpful assistant.}
      - DEBUG=${DEBUG:-false}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net

  # RabbitMQ broker + management UI
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
